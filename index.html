<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Facebook Search Builder</title>
  <link href="lib/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="lib/vue-datepicker.css">
  <style>
    /* Fix Bootstrap conflicts with VueDatePicker */
    .dp__theme_light {
      --dp-font-family: inherit;
    }
    .dp__input {
      border-color: #dee2e6;
      border-radius: 0.375rem;
      font-size: 1rem;
      line-height: 1.5;
      padding: 0.375rem 0.75rem 0.375rem 2.25rem;
      height: auto;
    }
    .dp__input_icon {
      width: 1rem;
      height: 1rem;
      top: 50%;
      transform: translateY(-50%);
    }
    .dp__input:focus {
      border-color: #86b7fe;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      outline: 0;
    }
  </style>

</head>

<body class="bg-light">
  <div id="app" class="container py-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-4">Facebook Search Builder</h2>

        <div class="mb-3">
          <label for="keyword" class="form-label">Keyword</label>
          <input type="text" v-model="keyword" id="keyword" class="form-control" placeholder="Type a keyword">
        </div>

        <div class="mb-3">
          <label class="form-label">Date Range</label>
          <vue-date-picker v-model="dateRange" :multi-calendars="{ solo: true }" :range="true" :format="'yyyy-MM-dd'"
            :teleport="true">
            <template #left-sidebar>
              <div class="p-2" style="width: max-content;">
                <ul class="list-unstyled">
                  <li><button class="btn btn-link p-0 text-decoration-none text-dark" @click="setRange('3DaysAgo')">3
                      Days Ago</button></li>
                  <li><button class="btn btn-link p-0 text-decoration-none text-dark" @click="setRange('7DaysAgo')">7
                      Days Ago</button></li>
                  <li><button class="btn btn-link p-0 text-decoration-none text-dark" @click="setRange('last7')">Last 7
                      Days</button></li>
                  <li><button class="btn btn-link p-0 text-decoration-none text-dark"
                      @click="setRange('thisMonth')">This Month</button></li>
                  <li><button class="btn btn-link p-0 text-decoration-none text-dark"
                      @click="setRange('lastMonth')">Last Month</button></li>
                  <li><button class="btn btn-link p-0 text-decoration-none text-dark" @click="setRange('thisYear')">This
                      Year</button></li>
                  <li><button class="btn btn-link p-0 text-decoration-none text-dark" @click="setRange('lastYear')">Last
                      Year</button></li>
                </ul>
              </div>
            </template>
          </vue-date-picker>
        </div>

        <button @click="openSearch" class="btn btn-primary">Search</button>
      </div>
    </div>
  </div>

  <script src="lib/vue.global.prod.js"></script>
  <script src="lib/vue-datepicker.iife.js"></script>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      components: { VueDatePicker },
      setup() {
        const keyword = ref('');
        const dateRange = ref([new Date(), new Date()]); // [startDate, endDate]

        function setRange(range) {
          const today = new Date();
          let start = new Date();
          let end = new Date();

          if (range === '3DaysAgo') {
            start.setDate(today.getDate() - 3);
            end = today;
          } else if (range === '7DaysAgo') {
            start.setDate(today.getDate() - 7);
            end = today;
          } else if (range === 'last7') {
            start.setDate(today.getDate() - 6);
            end = today;
          } else if (range === 'thisMonth') {
            start = new Date(today.getFullYear(), today.getMonth(), 1);
            end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
          } else if (range === 'lastMonth') {
            start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            end = new Date(today.getFullYear(), today.getMonth(), 0);
          } else if (range === 'thisYear') {
            start = new Date(today.getFullYear(), 0, 1);
            end = new Date(today.getFullYear(), 11, 31);
          } else if (range === 'lastYear') {
            start = new Date(today.getFullYear() - 1, 0, 1);
            end = new Date(today.getFullYear() - 1, 11, 31);
          }

          dateRange.value = [start, end];
        }

        function openSearch() {
          if (!keyword.value) {
            alert("Please enter a keyword.");
            return;
          }
          const [startDate, endDateVal] = dateRange.value;
          if (!startDate || !endDateVal) {
            alert("Please select both start and end dates.");
            return;
          }

          const start = new Date(startDate);
          const end = new Date(endDateVal);

          const data = {
            "rp_creation_time": JSON.stringify({
              name: "creation_time",
              args: JSON.stringify({
                start_year: start.getFullYear().toString(),
                start_month: `${start.getFullYear()}-${String(start.getMonth() + 1).padStart(2, '0')}`,
                end_year: end.getFullYear().toString(),
                end_month: `${end.getFullYear()}-${String(end.getMonth() + 1).padStart(2, '0')}`,
                start_day: start.toISOString().split('T')[0],
                end_day: end.toISOString().split('T')[0]
              })
            })
          };

          const filterEncoded = encodeBase64(JSON.stringify(data));
          const url = `https://www.facebook.com/search/posts?q=${encodeURIComponent(keyword.value)}&filters=${encodeURIComponent(filterEncoded)}`;
          window.open(url, "_blank");
        }

        // Base64 helper
        function encodeBase64(str) {
          return btoa(unescape(encodeURIComponent(str)));
        }

        return { keyword, dateRange, setRange, openSearch };
      }
    }).mount('#app');
  </script>
</body>

</html>
